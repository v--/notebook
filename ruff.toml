line-length = 120

[format]
quote-style = "single"

[lint.isort]
lines-after-imports = 2
known-first-party = ['notebook']

[lint.flake8-comprehensions]
allow-dict-calls-with-keyword-arguments = true

[lint.flake8-quotes]
inline-quotes = "single"
multiline-quotes = "single"

[lint.pylint]
max-returns = 10
max-branches = 15
max-args = 6

[lint.mccabe]
max-complexity = 15

[lint.per-file-ignores]
"__init__.py" = ["F401"]
"conftest.py" = ["F401"]
"test_*.py" = ["S101"]

[lint]
select = ["ALL"]
ignore = [
  "D1", # undocumented-* from pydocstyle (D)
  "D203",  # choice between D203 (incorrect-blank-line-before-class) and D211 (no-blank-line-before-class)
  "D213",  # choice between D212 (multi-line-summary-first-line) and D213 (multi-line-summary-second-line)
  "E501",  # Line too long ({width} > {limit})
  "E74",  # Ambiguous variable/class/function name: {name}
  "EM",  # flake8-errmsg (EM) disallows formatting from error messages
  "ERA",  # eradicate (ERA) incorrectly detects monograph references as code
  "G", # flake8-logging-format (G)
  "PLR2004",  # Magic value used in comparison, consider replacing {value} with a constant variable
  "PLR1714",  # Consider merging multiple comparisons: {expression}. Use a set if the elements are hashable.
  "PT028",  # Test function parameter {} has default argument
  "PTH123",  # open() should be replaced by Path.open()
  "RUF001", "RUF002", "RUF003",  # String/docstring/comment contains ambiguous {}. Did you mean {}?
  "S310",  # Audit URL open for permitted schemes. Allowing use of file: or custom schemes is often unexpected.
  "TC006",  # Checks for unquoted type expressions in typing.cast() calls.
  "TID252",  # Prefer absolute imports over relative imports from parent modules
  "TRY003",  # Avoid specifying long messages outside the exception class
]
